# scenarios_session_recovery.yaml
# 对应 refs/session-recovery.md
# 覆盖：stale in-progress 自愈（20分钟无活动触发进度确认）

- id: ST01
  suite: module:session-recovery
  name: "Stale 自愈：in-progress + owner/codex + 20分钟无活动 + Claude 空闲 → Claude 确认进度"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/codex
      comments:
        - body: "【OPENCLAW】已将此任务派发给 @codex，开始执行。"
          createdAt: "2026-03-29T10:00:00Z"
      last_activity_minutes_ago: 25
  open_prs: []
  pane_claude: idle
  expect:
    step2_action: progress-confirm
    dispatch_to: claude
    message_contains: ["42"]

- id: ST02
  suite: module:session-recovery
  name: "Stale 检测不误触：Claude 忙碌中，不触发进度确认（即使 owner/codex stale）"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/codex
      last_activity_minutes_ago: 25
  open_prs: []
  existing_branches: []
  pane_claude: busy
  expect:
    step2_action: none
    dispatch_to: none
