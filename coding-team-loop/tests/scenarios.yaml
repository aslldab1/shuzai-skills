# ─────────────────────────────────────────
# 全部完成通知
# ─────────────────────────────────────────

- id: E01
  name: "全部 verified + 无 pending → 无派发动作（下轮通知 Feishu）"
  issues:
    - number: 40
      label: verified
      owner_label: owner/codex
    - number: 42
      label: verified
      owner_label: owner/claude
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  memory:
    all_verified_notified_at: null   # 还未通知
  expect:
    step2_action: none
    step3_action: none
    dispatch_to: none

