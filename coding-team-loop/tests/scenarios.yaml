# coding-team-loop 场景测试集
# 用于验证 SKILL.md 逻辑正确性
#
# 字段说明：
#   issues: GitHub Issues 列表（label、owner_label）
#   open_prs: open PR 列表（number、body、review_state、latest_commit_at、latest_review_at）
#   pane_claude: Claude pane 状态（idle / busy）
#   pane_codex: Codex pane 状态（idle / busy）
#   memory: openclaw memory 快照
#   expect.step2_action: Step 2 应执行的动作
#   expect.step3_action: Step 3 应执行的动作
#   expect.dispatch_to: 派发目标（claude / codex / both / none）
#   expect.message_contains: 派发消息中必须包含的关键词
#   expect.step1_label_changes: Step 1 自动触发的 label 变更
#   expect.stale_recovery: stale in-progress 自愈动作（resume / reset / none）

# ─────────────────────────────────────────
# Step 1 — 自动 label 推进
# ─────────────────────────────────────────

- id: L01
  name: "PR 关联检测：PR body 含 related to #N，Issue 从 in-progress 推进为 needs-review"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: none
  pane_claude: idle
  pane_codex: idle
  expect:
    step1_label_changes: ["in-progress->needs-review"]
    step2_action: review-and-merge
    dispatch_to: claude
    message_contains: ["review", "42"]

- id: L02
  name: "PR commit 时间 > review 时间：自动从 changes-requested 推进为 needs-review"
  issues:
    - number: 42
      label: changes-requested
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: CHANGES_REQUESTED
      latest_review_at: "2026-03-26T10:00:00Z"
      latest_commit_at: "2026-03-26T11:00:00Z"   # 晚于 review
  pane_claude: idle
  pane_codex: idle
  expect:
    step1_label_changes: ["changes-requested->needs-review"]
    step2_action: review-and-merge
    dispatch_to: claude
    message_contains: ["review"]

- id: L03
  name: "PR commit 时间 < review 时间：不推进，保持 changes-requested"
  issues:
    - number: 42
      label: changes-requested
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: CHANGES_REQUESTED
      latest_review_at: "2026-03-26T11:00:00Z"
      latest_commit_at: "2026-03-26T10:00:00Z"   # 早于 review，Codex 未修复
  pane_claude: idle
  pane_codex: idle
  expect:
    step1_label_changes: []
    step3_action: fix-dispatch
    dispatch_to: codex
    message_contains: ["42"]

# ─────────────────────────────────────────
# Step 1 — Stale in-progress 自愈
# ─────────────────────────────────────────

- id: ST01
  name: "Stale 自愈：in-progress + Codex 空闲 + 无 PR + 有对应分支 → 标记恢复"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/codex
  open_prs: []
  existing_branches: ["issue-42"]
  pane_claude: idle
  pane_codex: idle   # 空闲说明中断了
  expect:
    stale_recovery: resume
    # 下轮才派发恢复消息，本轮只标记
    step3_action: none
    dispatch_to: none

- id: ST02
  name: "Stale 自愈：in-progress + Codex 空闲 + 无 PR + 无分支 → 重置为 pending"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/codex
  open_prs: []
  existing_branches: []
  pane_claude: idle
  pane_codex: idle
  expect:
    stale_recovery: reset
    step1_label_changes: ["in-progress->pending"]
    # 重置为 pending 后同轮 Step 3-P2 会接走
    step3_action: task-dispatch
    dispatch_to: codex

- id: ST03
  name: "Stale 检测不误触：Codex 忙碌中，不触发自愈"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/codex
  open_prs: []
  existing_branches: []
  pane_claude: idle
  pane_codex: busy   # Codex 仍在执行
  expect:
    stale_recovery: none
    step3_action: none
    dispatch_to: none

# ─────────────────────────────────────────
# Step 2 — Claude 侧优先级
# ─────────────────────────────────────────

- id: C01
  name: "Step 2-P1：有 needs-review Issue，Claude 空闲 → 派发 review"
  issues:
    - number: 42
      label: needs-review
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: none
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: review-and-merge
    dispatch_to: claude
    message_contains: ["review", "42"]

- id: C02
  name: "Step 2-P2：有 verifying + owner/codex Issue，Claude 空闲 → 派发验收请求"
  issues:
    - number: 42
      label: verifying
      owner_label: owner/codex
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: deliverable-verify
    dispatch_to: claude
    message_contains: ["验收", "42"]

- id: C02b
  name: "owner/shuzai：无评论 → 跳过，继续等 HUMAN"
  issues:
    - number: 42
      label: verifying
      owner_label: owner/shuzai
      latest_comment: null
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: none
    step3_action: none
    dispatch_to: none

- id: C02c
  name: "owner/shuzai：最新评论是系统写的（【OPENCLAW】）→ 跳过，等 HUMAN 再次操作"
  issues:
    - number: 42
      label: verifying
      owner_label: owner/shuzai
      latest_comment: "【OPENCLAW】已将此任务重新派发给 Claude"
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: none
    step3_action: none
    dispatch_to: none

- id: C02d
  name: "owner/shuzai：最新评论是 HUMAN 写的 → 打回给上一个提交者（previous_owner=owner/claude）"
  issues:
    - number: 42
      label: verifying
      owner_label: owner/shuzai
      latest_comment: "方案方向有问题，请把接入方式改成 MCP 而不是 SDK"
      previous_owner: owner/claude   # 上一个【OPENCLAW】评论中记录的提交者
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step1_label_changes: ["verifying->pending"]
    step2_action: task-dispatch
    dispatch_to: claude
    message_contains: ["42"]

- id: C03
  name: "Step 2-P3：有 pending+owner/claude Issue，Claude 空闲 → 派发开发任务"
  issues:
    - number: 42
      label: pending
      owner_label: owner/claude
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: task-dispatch
    dispatch_to: claude
    message_contains: ["42"]

- id: C04
  name: "Step 2-P4：有 pending 无 owner 的 Issue，Claude 空闲 → 路由"
  issues:
    - number: 42
      label: pending
      owner_label: null
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: route-owner
    dispatch_to: claude
    message_contains: ["42"]

- id: C05
  name: "Step 2 优先级：同时有 needs-review 和 pending，应优先处理 needs-review"
  issues:
    - number: 40
      label: needs-review
      owner_label: owner/codex
    - number: 42
      label: pending
      owner_label: owner/claude
  open_prs:
    - number: 10
      body: "related to #40"
      review_state: none
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: review-and-merge
    dispatch_to: claude
    message_contains: ["review", "40"]

- id: C06
  name: "Step 2 跳过：Claude 忙碌"
  issues:
    - number: 42
      label: needs-review
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: none
  pane_claude: busy   # Claude 忙碌，跳过 Step 2
  pane_codex: idle
  expect:
    step2_action: none
    dispatch_to: none

# ─────────────────────────────────────────
# Step 3 — Codex 侧优先级
# ─────────────────────────────────────────

- id: D01
  name: "Step 3-P1：有 changes-requested Issue，Codex 空闲 → 派发 fix"
  issues:
    - number: 42
      label: changes-requested
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: CHANGES_REQUESTED
      latest_review_at: "2026-03-26T11:00:00Z"
      latest_commit_at: "2026-03-26T10:00:00Z"
  pane_claude: idle
  pane_codex: idle
  expect:
    step3_action: fix-dispatch
    dispatch_to: codex
    message_contains: ["42"]

- id: D02
  name: "Step 3-P2：有 pending+owner/codex Issue，Codex 空闲 → 派发开发任务"
  issues:
    - number: 42
      label: pending
      owner_label: owner/codex
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step3_action: task-dispatch
    dispatch_to: codex
    message_contains: ["42"]

- id: D03
  name: "Step 3 跳过：Codex 忙碌"
  issues:
    - number: 42
      label: pending
      owner_label: owner/codex
  open_prs: []
  pane_claude: idle
  pane_codex: busy
  expect:
    step3_action: none

# ─────────────────────────────────────────
# 同时派发两侧
# ─────────────────────────────────────────

- id: B01
  name: "两侧同时派发：Claude 有 needs-review，Codex 有 pending/codex，两者均空闲"
  issues:
    - number: 40
      label: needs-review
      owner_label: owner/codex
    - number: 42
      label: pending
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #40"
      review_state: none
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: review-and-merge
    step3_action: task-dispatch
    dispatch_to: both

# ─────────────────────────────────────────
# 取最小编号
# ─────────────────────────────────────────

- id: P01
  name: "多个 pending/codex Issue：取编号最小的一条"
  issues:
    - number: 42
      label: pending
      owner_label: owner/codex
    - number: 38
      label: pending
      owner_label: owner/codex
    - number: 50
      label: pending
      owner_label: owner/codex
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step3_action: task-dispatch
    dispatch_to: codex
    message_contains: ["38"]   # 最小编号

