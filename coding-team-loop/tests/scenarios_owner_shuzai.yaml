    - number: 42
      label: verifying
      owner_label: owner/shuzai
      latest_comment: "方案方向有问题，请把接入方式改成 MCP 而不是 SDK"
      previous_owner: owner/claude
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step1_label_changes: ["verifying->pending", "owner/shuzai->owner/claude"]
    step2_action: task-dispatch
    dispatch_to: claude
    message_contains: ["42"]
