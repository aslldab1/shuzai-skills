# scenarios_fix_dispatch.yaml
# 对应 refs/fix-dispatch.md
# 覆盖：changes-requested → fix 派发给 Codex

- id: D01
  suite: module:fix-dispatch
  name: "Step 3-P1：有 changes-requested Issue，Codex 空闲 → 派发 fix"
  issues:
    - number: 42
      label: changes-requested
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: CHANGES_REQUESTED
      latest_review_at: "2026-03-26T11:00:00Z"
      latest_commit_at: "2026-03-26T10:00:00Z"
  pane_claude: idle
  pane_codex: idle
  expect:
    step3_action: fix-dispatch
    dispatch_to: codex
    message_contains: ["42"]
