# scenarios_progress_confirm.yaml
# 对应 refs/progress-confirm.md
# 覆盖：stale 20分钟触发进度确认、重复发送防护、worker 回复处理

# ── 进度确认触发 ──────────────────────────────────────────────────────

- id: PC01
  suite: core
  name: "Stale 20分钟：Claude 和 Codex 各有 stale Issue + worker 空闲 → 两侧同时发进度确认"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/claude
      comments:
        - body: "【OPENCLAW】已将此任务派发给 @claude，开始执行。"
          createdAt: "2026-03-29T10:00:00Z"
      last_activity_minutes_ago: 25
    - number: 43
      label: in-progress
      owner_label: owner/codex
      comments:
        - body: "【OPENCLAW】已将此任务派发给 @codex，开始执行。"
          createdAt: "2026-03-29T10:00:00Z"
      last_activity_minutes_ago: 25
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: progress-confirm
    step3_action: progress-confirm
    dispatch_to: both

- id: PC02
  suite: core
  name: "Stale 20分钟但 worker 仍在忙碌 → 不发确认消息"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/claude
      last_activity_minutes_ago: 25
  open_prs: []
  pane_claude: busy
  pane_codex: idle
  expect:
    step2_action: none
    dispatch_to: none

# ── 重复发送防护 ──────────────────────────────────────────────────────

- id: PC03
  suite: module:progress-confirm
  name: "已发过进度确认且未回复 → 不重复发送"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/claude
      comments:
        - body: "【OPENCLAW】已将此任务派发给 @claude，开始执行。"
          createdAt: "2026-03-29T10:00:00Z"
        - body: "【OPENCLAW】【进度确认】\nIssue #42：...\n距上次活动已超过 20 分钟..."
          createdAt: "2026-03-29T10:25:00Z"
      last_activity_minutes_ago: 35
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: none
    dispatch_to: none

- id: PC04
  suite: module:progress-confirm
  name: "worker 回复进度说明（未完成）→ 继续等待，不推进状态"
  issues:
    - number: 42
      label: in-progress
      owner_label: owner/claude
      comments:
        - body: "【OPENCLAW】【进度确认】Issue #42..."
          createdAt: "2026-03-29T10:25:00Z"
        - body: "【CLAUDE】仍在进行中，正在处理第三步，预计 10 分钟完成"
          createdAt: "2026-03-29T10:30:00Z"
      last_activity_minutes_ago: 5
  open_prs: []
  pane_claude: idle
  pane_codex: idle
  expect:
    step1_label_changes: []
    step2_action: none
    dispatch_to: none
