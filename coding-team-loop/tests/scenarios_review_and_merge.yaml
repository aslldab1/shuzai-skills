# scenarios_review_and_merge.yaml
# 对应 refs/review-and-merge.md
# 覆盖：needs-review 派发、changes-requested 自动推进

- id: C01
  suite: module:review-and-merge
  name: "Step 2-P1：有 needs-review Issue，Claude 空闲 → 派发 review"
  issues:
    - number: 42
      label: needs-review
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: none
  pane_claude: idle
  pane_codex: idle
  expect:
    step2_action: review-and-merge
    dispatch_to: claude
    message_contains: ["review", "42"]

- id: L02
  suite: core
  name: "PR commit 时间 > review 时间：自动从 changes-requested 推进为 needs-review"
  issues:
    - number: 42
      label: changes-requested
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: CHANGES_REQUESTED
      latest_review_at: "2026-03-26T10:00:00Z"
      latest_commit_at: "2026-03-26T11:00:00Z"
  pane_claude: idle
  pane_codex: idle
  expect:
    step1_label_changes: ["changes-requested->needs-review"]
    step2_action: review-and-merge
    dispatch_to: claude
    message_contains: ["review"]

- id: L03
  suite: core
  name: "PR commit 时间 < review 时间：不推进，保持 changes-requested"
  issues:
    - number: 42
      label: changes-requested
      owner_label: owner/codex
  open_prs:
    - number: 10
      body: "related to #42"
      review_state: CHANGES_REQUESTED
      latest_review_at: "2026-03-26T11:00:00Z"
      latest_commit_at: "2026-03-26T10:00:00Z"
  pane_claude: idle
  pane_codex: idle
  expect:
    step1_label_changes: []
    step3_action: fix-dispatch
    dispatch_to: codex
    message_contains: ["42"]
